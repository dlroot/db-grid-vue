name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: db-grid-vue/package-lock.json

      - name: Install dependencies
        run: cd db-grid-vue && npm ci

      - name: Run typecheck
        run: cd db-grid-vue && npm run typecheck

      - name: Run tests
        run: cd db-grid-vue && npm run test:run

      - name: Run coverage
        run: cd db-grid-vue && npm run test:coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./db-grid-vue/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: db-grid-vue/package-lock.json

      - name: Install dependencies
        run: cd db-grid-vue && npm ci

      - name: Run typecheck
        run: cd db-grid-vue && npm run typecheck
