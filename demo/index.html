<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>db-grid-element Demo</title>
  <link rel="stylesheet" href="./styles-WAO5YLSM.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 20px; }
    h1 { color: #2196f3; }
    #status { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .loading { background: #fff3cd; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
  
  <!-- Import map for ES modules -->
  <script type="importmap">
  {
    "imports": {
      "./chunk-TQPZRHFO.js": "./chunk-TQPZRHFO.js",
      "./chunk-FK6H3RFT.js": "./chunk-FK6H3RFT.js",
      "./chunk-5RVQ7557.js": "./chunk-5RVQ7557.js",
      "./chunk-BOYL57GH.js": "./chunk-BOYL57GH.js",
      "./chunk-GXAQDK3Q.js": "./chunk-GXAQDK3Q.js",
      "./chunk-NUHLIM3N.js": "./chunk-NUHLIM3N.js",
      "./chunk-UIJ6C4PS.js": "./chunk-UIJ6C4PS.js",
      "./chunk-UPHFQ2NC.js": "./chunk-UPHFQ2NC.js",
      "./main-YMLMMD3B.js": "./main-YMLMMD3B.js"
    }
  }
  </script>
</head>
<body>
  <h1>db-grid-element Web Component Demo</h1>
  
  <div id="status" class="loading">等待 db-grid-element 注册...</div>
  
  <db-grid-element id="grid" style="display: block; width: 100%; height: 400px; border: 1px solid #ddd;"></db-grid-element>
  
  <div style="margin-top: 20px;">
    <h3>API 测试</h3>
    <button onclick="exportExcel()">导出 Excel</button>
    <button onclick="refreshData()">刷新数据</button>
    <button onclick="resetState()">重置状态</button>
  </div>
  
  <script>
    // 示例数据
    const sampleData = [
      { id: 1, name: '张三', age: 28, department: '技术部', salary: 25000 },
      { id: 2, name: '李四', age: 35, department: '产品部', salary: 30000 },
      { id: 3, name: '王五', age: 42, department: '管理层', salary: 50000 },
      { id: 4, name: '赵六', age: 26, department: '技术部', salary: 22000 },
      { id: 5, name: '钱七', age: 31, department: '市场部', salary: 28000 },
    ];
    
    const columnDefs = [
      { field: 'id', headerName: 'ID', width: 80 },
      { field: 'name', headerName: '姓名', width: 120 },
      { field: 'age', headerName: '年龄', width: 100 },
      { field: 'department', headerName: '部门', width: 150 },
      { field: 'salary', headerName: '薪资', width: 120, 
        cellRenderer: (params) => '¥' + params.value.toLocaleString() },
    ];
    
    // 等待 custom element 注册
    function waitForCustomElement(timeout = 15000) {
      return new Promise((resolve, reject) => {
        const startTime = Date.now();
        
        function check() {
          if (customElements.get('db-grid-element')) {
            resolve();
          } else if (Date.now() - startTime > timeout) {
            reject(new Error('等待 db-grid-element 注册超时'));
          } else {
            setTimeout(check, 100);
          }
        }
        
        check();
      });
    }
    
    async function init() {
      const status = document.getElementById('status');
      const grid = document.getElementById('grid');
      
      try {
        status.textContent = '正在等待 db-grid-element 注册...';
        status.className = 'loading';
        
        await waitForCustomElement();
        
        status.textContent = 'db-grid-element 注册成功！正在初始化数据...';
        status.className = 'success';
        
        // 设置数据
        grid.setAttribute('row-data', JSON.stringify(sampleData));
        grid.setAttribute('column-defs', JSON.stringify(columnDefs));
        
        console.log('db-grid-element 初始化完成');
      } catch (err) {
        status.textContent = '错误: ' + err.message;
        status.className = 'error';
        console.error(err);
      }
    }
    
    // API 函数
    function exportExcel() {
      const grid = document.getElementById('grid');
      if (grid && grid.exportToExcel) {
        grid.exportToExcel('demo-export.xlsx');
      }
    }
    
    function refreshData() {
      const grid = document.getElementById('grid');
      if (grid && grid.refreshData) {
        grid.refreshData();
      }
    }
    
    function resetState() {
      const grid = document.getElementById('grid');
      if (grid && grid.resetState) {
        grid.resetState();
      }
    }
    
    // 启动
    init();
  </script>
  
  <!-- 加载 Angular Elements bundle 作为 ES 模块 -->
  <script src="./main-YMLMMD3B.js" type="module"></script>
</body>
</html>
