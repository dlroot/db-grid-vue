<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>db-grid-element Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 20px; }
    h1 { color: #2196f3; }
    #status { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .loading { background: #fff3cd; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    db-grid-element { display: block; width: 100%; height: 400px; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>db-grid-element Web Component Demo</h1>
  
  <div id="status" class="loading">等待 db-grid-element 注册...</div>
  
  <db-grid-element id="grid"></db-grid-element>
  
  <div style="margin-top: 20px;">
    <h3>API 测试</h3>
    <button onclick="exportExcel()">导出 Excel</button>
    <button onclick="refreshData()">刷新数据</button>
    <button onclick="resetState()">重置状态</button>
  </div>
  
  <script src="./db-grid-standalone.js"></script>
  
  <script>
    const sampleData = [
      { id: 1, name: '张三', age: 28, department: '技术部', salary: 25000 },
      { id: 2, name: '李四', age: 35, department: '产品部', salary: 30000 },
      { id: 3, name: '王五', age: 42, department: '管理层', salary: 50000 },
      { id: 4, name: '赵六', age: 26, department: '技术部', salary: 22000 },
      { id: 5, name: '钱七', age: 31, department: '市场部', salary: 28000 },
      { id: 6, name: '孙八', age: 29, department: '设计部', salary: 26000 },
      { id: 7, name: '周九', age: 38, department: '运营部', salary: 32000 },
      { id: 8, name: '吴十', age: 45, department: '管理层', salary: 55000 },
      { id: 9, name: '郑一', age: 24, department: '技术部', salary: 20000 },
      { id: 10, name: '王二', age: 33, department: '产品部', salary: 29000 },
      { id: 11, name: '冯三', age: 27, department: '市场部', salary: 24000 },
      { id: 12, name: '陈五', age: 40, department: '管理层', salary: 48000 },
    ];
    
    const columnDefs = [
      { field: 'id', headerName: 'ID', width: 80, checkboxSelection: true },
      { field: 'name', headerName: '姓名', width: 120 },
      { field: 'age', headerName: '年龄', width: 100 },
      { field: 'department', headerName: '部门', width: 150 },
      { field: 'salary', headerName: '薪资', width: 120, 
        valueFormatter: (params) => '¥' + params.value.toLocaleString() },
    ];
    
    async function init() {
      const status = document.getElementById('status');
      
      try {
        await customElements.whenDefined('db-grid-element');
        const grid = document.getElementById('grid');
        
        status.textContent = 'db-grid-element 已注册！正在加载数据...';
        status.className = 'success';
        
        await new Promise(r => setTimeout(r, 100));
        
        grid.rowData = sampleData;
        grid.columnDefs = columnDefs;
        
        status.textContent = '✅ 表格加载成功！共 ' + sampleData.length + ' 条数据';
        
        console.log('db-grid-element 初始化完成');
      } catch (err) {
        status.textContent = '错误: ' + err.message;
        status.className = 'error';
        console.error(err);
      }
    }
    
    function exportExcel() {
      document.getElementById('grid').exportToExcel('demo-export.csv');
    }
    
    function refreshData() { document.getElementById('grid').refreshData(); }
    function resetState() { document.getElementById('grid').resetState(); }
    
    // 等 DOM 完全就绪后再设置数据
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
