<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Grid Demo - 简化版</title>
  <link rel="stylesheet" href="./db-grid-styles.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    #app {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .toolbar {
      margin: 16px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 16px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #40a9ff;
    }
    .status {
      margin-left: 12px;
      color: #666;
    }
    .event-log {
      margin-top: 16px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>DB Grid Web Component Demo</h1>
    
    <div class="toolbar">
      <button onclick="selectAll()">全选</button>
      <button onclick="deselectAll()">取消全选</button>
      <button onclick="refresh()">刷新</button>
      <button onclick="exportCsv()">导出 CSV</button>
      <span class="status" id="status">已选中 0 行</span>
    </div>
    
    <!-- DB Grid Web Component -->
    <db-grid-element id="myGrid"></db-grid-element>
    
    <div class="event-log" id="eventLog">等待事件...</div>
  </div>

  <!-- 加载本地构建的 db-grid Web Component -->
  <script src="./db-grid-elements.js"></script>
  
  <script>
    // 列定义
    const columnDefs = [
      { field: 'id', headerName: 'ID', width: 70, checkboxSelection: true },
      { field: 'name', headerName: '姓名', width: 120, sortable: true },
      { field: 'age', headerName: '年龄', width: 80, sortable: true },
      { field: 'email', headerName: '邮箱', width: 200 },
      { field: 'department', headerName: '部门', width: 120, filter: true },
      { field: 'salary', headerName: '薪资', width: 120, sortable: true },
      { 
        field: 'status', 
        headerName: '状态', 
        width: 100,
        valueFormatter: (params) => params.value === 'active' ? '🟢 在职' : '🔴 离职'
      },
      { field: 'joinDate', headerName: '入职日期', width: 130 }
    ];

    // 示例数据
    const rowData = [
      { id: 1, name: '张三', age: 28, email: 'zhangsan@example.com', department: '技术部', salary: 15000, status: 'active', joinDate: '2020-01-15' },
      { id: 2, name: '李四', age: 35, email: 'lisi@example.com', department: '产品部', salary: 18000, status: 'active', joinDate: '2019-06-20' },
      { id: 3, name: '王五', age: 42, email: 'wangwu@example.com', department: '设计部', salary: 20000, status: 'inactive', joinDate: '2018-03-10' },
      { id: 4, name: '赵六', age: 31, email: 'zhaoliu@example.com', department: '市场部', salary: 16000, status: 'active', joinDate: '2021-09-05' },
      { id: 5, name: '钱七', age: 26, email: 'qianqi@example.com', department: '技术部', salary: 12000, status: 'active', joinDate: '2022-02-28' },
      { id: 6, name: '孙八', age: 38, email: 'sunba@example.com', department: '财务部', salary: 19000, status: 'active', joinDate: '2017-11-12' },
      { id: 7, name: '周九', age: 29, email: 'zhoujiu@example.com', department: '技术部', salary: 14000, status: 'active', joinDate: '2021-04-18' },
      { id: 8, name: '吴十', age: 45, email: 'wushi@example.com', department: '人力资源部', salary: 22000, status: 'inactive', joinDate: '2016-07-22' },
    ];

    // 等待 db-grid-element 注册
    let gridElement = null;
    let gridApi = null;

    function log(message) {
      const eventLog = document.getElementById('eventLog');
      eventLog.textContent = message;
      console.log(message);
    }

    function updateStatus() {
      if (gridApi) {
        const selectedRows = gridApi.getSelectedRows();
        document.getElementById('status').textContent = `已选中 ${selectedRows.length} 行`;
      }
    }

    function selectAll() {
      if (gridApi) {
        gridApi.selectAll();
        updateStatus();
      }
    }

    function deselectAll() {
      if (gridApi) {
        gridApi.deselectAll();
        updateStatus();
      }
    }

    function refresh() {
      if (gridApi) {
        gridApi.refreshView();
        log('表格已刷新');
      }
    }

    function exportCsv() {
      if (gridApi) {
        const csv = gridApi.exportDataAsCsv({ fileName: '员工数据.csv' });
        log('CSV 导出已触发');
      }
    }

    // 初始化 grid
    function initGrid() {
      gridElement = document.getElementById('myGrid');
      
      if (!gridElement) {
        log('❌ 找不到 db-grid-element');
        return;
      }

      // 设置属性
      gridElement.rowData = rowData;
      gridElement.columnDefs = columnDefs;
      gridElement.height = '400px';

      // 监听事件
      gridElement.addEventListener('gridReady', (event) => {
        log('✅ Grid Ready');
        gridApi = event.detail?.api || gridElement.getGridApi?.();
        console.log('Grid API:', gridApi);
      });

      gridElement.addEventListener('selectionChanged', (event) => {
        updateStatus();
        const selectedRows = event.detail?.selectedRows || [];
        log(`选择变化: ${selectedRows.length} 行`);
      });

      gridElement.addEventListener('cellClick', (event) => {
        const detail = event.detail;
        log(`单元格点击: [${detail.colDef?.field}] = ${detail.value}`);
      });

      gridElement.addEventListener('rowClicked', (event) => {
        const detail = event.detail;
        log(`行点击: ${detail.data?.name}`);
      });

      log('正在初始化 Grid...');
    }

    // 等待 Web Component 注册完成
    function waitForElement() {
      if (customElements.get('db-grid-element')) {
        log('✅ db-grid-element 已注册');
        setTimeout(initGrid, 100);
      } else {
        log('⏳ 等待 db-grid-element 注册...');
        setTimeout(waitForElement, 100);
      }
    }

    // 启动
    document.addEventListener('DOMContentLoaded', () => {
      log('页面加载完成，等待 Web Component...');
      setTimeout(waitForElement, 500);
    });
  </script>
</body>
</html>
